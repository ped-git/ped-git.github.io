            function buildConsensusSegmentTable(detail) {
                if (!detail || !Array.isArray(detail.segments) || detail.segments.length === 0) {
                    return '<div class="consensus-card-empty">بخش‌بندی این مجموعه در دسترس نیست.</div>';
                }
                var rows = [];
                for (var i = 0; i < detail.segments.length; i++) {
                    var segment = detail.segments[i] || {};
                    rows.push(
                        '<tr><td class="consensus-col-ar">' + buildConsensusSegmentMarkup(segment) +
                        '</td><td class="consensus-col-tr">' + escapeHtml(segment.translation_segment || '') + '</td></tr>'
                    );
                }
                return '<table class="consensus-segment-table"><thead><tr><th>متن اجماعی</th><th>ترجمه</th></tr></thead><tbody>' + rows.join('') + '</tbody></table>';
            }

            function renderAlignedText(text) {
                if (!text) return '';
                var tokens = String(text).trim().split(/\s+/);
                var mode = null;
                var buffer = [];
                var parts = [];

                function flushBuffer() {
                    if (buffer.length === 0) return;
                    var content = escapeHtml(buffer.join(' '));
                    if (mode === 'quranic_text') {
                        parts.push('<quranic_text>' + content + '</quranic_text>');
                    } else if (mode === 'footnote') {
                        parts.push('<footnote>[' + content + ']</footnote>');
                    } else {
                        parts.push(content);
                    }
                    buffer = [];
                }

                for (var i = 0; i < tokens.length; i++) {
                    var token = tokens[i];
                    if (token === 'TAG_OPEN:quranic_text') {
                        flushBuffer();
                        mode = 'quranic_text';
                        continue;
                    }
                    if (token === 'TAG_CLOSE:quranic_text') {
                        flushBuffer();
                        mode = null;
                        continue;
                    }
                    if (token === 'TAG_OPEN:footnote') {
                        flushBuffer();
                        mode = 'footnote';
                        continue;
                    }
                    if (token === 'TAG_CLOSE:footnote') {
                        flushBuffer();
                        mode = null;
                        continue;
                    }
                    if (!mode && token === '-') {
                        flushBuffer();
                        parts.push('<span class="alignment-gap">-</span>');
                        continue;
                    }
                    buffer.push(token);
                }
                flushBuffer();
                return processHadithText(parts.join(' '));
            }

            function buildConsensusMembersTable(setId) {
                var translateDetail = state.consensusTranslateDetails[setId];
                var detail = state.consensusMemberDetails[setId];
                if (!detail || !translateDetail) {
                    return '<div class="consensus-card-loading">در حال بارگذاری احادیث این مجموعه...</div>';
                }
                if (!Array.isArray(detail.members) || detail.members.length === 0) {
                    return '<div class="consensus-card-empty">حدیثی برای این مجموعه پیدا نشد.</div>';
                }
                var view = state.consensusHadithView[setId] || 'segment-grid';
                if (view === 'segment-grid') return buildConsensusSegmentAlignmentTable(detail, translateDetail);
                if (view === 'token-grid') return buildConsensusTokenAlignmentTable(detail);
                if (view === 'aligned-list') return buildConsensusAlignedHadithList(detail);
                return buildConsensusSimpleHadithList(detail);
            }

            function buildConsensusSegmentAlignmentTable(detail, translateDetail) {
                var members = detail.members || [];
                var boundaries = getSegmentBoundaries(translateDetail);
                var memberSlices = [];
                for (var i = 0; i < members.length; i++) {
                    memberSlices.push(splitAlignedCellsBySegments(parseAlignedGrid(members[i].aligned_body || ''), boundaries));
                }
                var headerCells = [
                    '<th>متن اجماعی</th>',
                    '<th>ترجمه</th>'
                ];
                for (var headerIdx = 0; headerIdx < members.length; headerIdx++) {
                    headerCells.push('<th>روایت ' + fmtFa(headerIdx + 1) + '</th>');
                }
                var rows = [];
                for (var segIdx = 0; segIdx < boundaries.length; segIdx++) {
                    var segment = translateDetail.segments[segIdx] || {};
                    var row = [
                        '<tr>',
                        '<td class="consensus-col-ar">' + buildConsensusSegmentMarkup(segment) + '</td>',
                        '<td class="consensus-col-tr">' + escapeHtml(segment.translation_segment || '') + '</td>'
                    ];
                    for (var memberIdx = 0; memberIdx < memberSlices.length; memberIdx++) {
                        row.push('<td class="consensus-row-cell">' + buildMarkupFromAlignedCells(memberSlices[memberIdx][segIdx] || []) + '</td>');
                    }
                    row.push('</tr>');
                    rows.push(row.join(''));
                }
                return '<div class="consensus-table-scroll"><table class="consensus-members-table consensus-members-table--segments"><thead><tr>' + headerCells.join('') + '</tr></thead><tbody>' + rows.join('') + '</tbody></table></div>';
            }

            function buildConsensusTokenAlignmentTable(detail) {
                var members = detail.members || [];
                var consensusCells = getConsensusTokenGrid(detail);
                var memberCells = [];
                for (var i = 0; i < members.length; i++) {
                    memberCells.push(parseAlignedGrid(members[i].aligned_body || ''));
                }
                var maxRows = consensusCells.length;
                var headCells = ['<th class="consensus-row-index">ردیف</th>', '<th>اجماع</th>'];
                for (var j = 0; j < members.length; j++) {
                    headCells.push('<th>روایت ' + fmtFa(j + 1) + '</th>');
                }
                var bodyRows = [];
                for (var rowIdx = 0; rowIdx < maxRows; rowIdx++) {
                    var rowParts = ['<tr><td class="consensus-row-index">' + fmtFa(rowIdx + 1) + '</td>'];
                    rowParts.push('<td class="consensus-row-cell">' + renderSingleAlignmentCell(consensusCells[rowIdx]) + '</td>');
                    for (var memberIdx = 0; memberIdx < memberCells.length; memberIdx++) {
                        rowParts.push('<td class="consensus-row-cell">' + renderSingleAlignmentCell(memberCells[memberIdx][rowIdx]) + '</td>');
                    }
                    rowParts.push('</tr>');
                    bodyRows.push(rowParts.join(''));
                }
                return '<div class="consensus-table-scroll"><table class="consensus-members-table consensus-alignment-rows-table"><thead><tr>' + headCells.join('') + '</tr></thead><tbody>' + bodyRows.join('') + '</tbody></table></div>';
            }

            function buildConsensusAlignedHadithList(detail) {
                var members = detail.members || [];
                var cards = [];
                for (var i = 0; i < members.length; i++) {
                    var member = members[i] || {};
                    cards.push(
                        '<article class="hadith-card">' +
                        '<div class="consensus-member-header"><span class="consensus-inline-label">روایت ' + fmtFa(i + 1) + '</span><div>' + processHadithText(member.header_text || '') + '</div></div>' +
                        '<div class="consensus-aligned-text">' + renderAlignedText(member.aligned_body || '') + '</div>' +
                        (member.translation ? '<div class="hadith-translation">' + escapeHtml(member.translation) + '</div>' : '') +
                        '</article>'
                    );
                }
                return cards.join('');
            }

            function buildConsensusSimpleHadithList(detail) {
                var members = detail.members || [];
                var cards = [];
                for (var i = 0; i < members.length; i++) {
                    var member = members[i] || {};
                    cards.push(
                        '<article class="hadith-card">' +
                        '<div class="consensus-member-header"><span class="consensus-inline-label">روایت ' + fmtFa(i + 1) + '</span><div>' + processHadithText(member.header_text || '') + '</div></div>' +
                        '<div class="consensus-member-text">' + processHadithText(member.body_text || '') + '</div>' +
                        (member.translation ? '<div class="hadith-translation">' + escapeHtml(member.translation) + '</div>' : '') +
                        '</article>'
                    );
                }
                return cards.join('');
            }

            function renderConsensusCard(setId, orderIndex) {
                var summary = state.consensusTranslateById && state.consensusTranslateById[setId];
                var detail = state.consensusTranslateDetails[setId];
                var isOpen = !!state.consensusOpen[setId];
                var view = state.consensusHadithView[setId] || 'segment-grid';
                var metaParts = [];
                if (summary && summary.member_count != null) metaParts.push(fmtFa(summary.member_count) + ' حدیث');
                if (summary && summary.segment_count != null) metaParts.push(fmtFa(summary.segment_count) + ' بخش');
                if (summary && summary.translation_available_count != null) metaParts.push(fmtFa(summary.translation_available_count) + ' ترجمه');
                if (summary && summary.translation_source_hid != null) metaParts.push('شماره حدیث: ' + escapeHtml(fmtFa(summary.translation_source_hid)));
                if (detail && detail.translation_language) metaParts.push('زبان ترجمه: ' + escapeHtml(localizedLanguageName(detail.translation_language)));
                if (detail && detail.translation_source) {
                    if (detail.translation_source.coverage != null) metaParts.push('پوشش: ' + escapeHtml(fmtFa(Number(detail.translation_source.coverage).toFixed(2))));
                    if (detail.translation_source.match_ratio != null) metaParts.push('تطبیق: ' + escapeHtml(fmtFa(Number(detail.translation_source.match_ratio).toFixed(2))));
                    if (detail.translation_source.translation_word_count != null) metaParts.push(fmtFa(detail.translation_source.translation_word_count) + ' واژه ترجمه');
                }
                var html = '<article class="consensus-card" data-set-id="' + escapeHtml(setId) + '">';
                // html += '<h3 class="consensus-card-title">مجموعه روایی ' + fmtFa(orderIndex + 1) + '</h3>';
                html += '<div class="consensus-card-meta">' + metaParts.join(' | ') + '</div>';
                if (summary && summary.body_consensus_preview) {
                    html += '<div class="consensus-card-headerline">' + escapeHtml(summary.body_consensus_preview) + '</div>';
                }
                if (detail) {
                    html += buildConsensusSegmentTable(detail);
                } else {
                    html += '<div class="consensus-card-loading">در حال بارگذاری متن اجماعی و ترجمه...</div>';
                }
                html += '<div class="consensus-actions">';
                html += '<button type="button" class="consensus-toggle-btn" data-set-id="' + escapeHtml(setId) + '" title="' + (isOpen ? 'بستن احادیث این مجموعه' : 'نمایش احادیث این مجموعه') + '" aria-label="' + (isOpen ? 'بستن احادیث این مجموعه' : 'نمایش احادیث این مجموعه') + '">' + (isOpen ? '−' : '+') + '</button>';
                html += '</div>';
                if (isOpen) {
                    html += '<div class="consensus-members-panel">';
                    html += '<div class="consensus-members-header">';
                    html += '<div class="consensus-members-title">احادیث این مجموعه</div>';
                    html += '<div class="consensus-view-switch">';
                    html += '<button type="button" class="consensus-view-btn' + (view === 'segment-grid' ? ' is-active' : '') + '" data-set-id="' + escapeHtml(setId) + '" data-view="segment-grid">هم‌ردیفی قطعه‌ها</button>';
                    html += '<button type="button" class="consensus-view-btn' + (view === 'token-grid' ? ' is-active' : '') + '" data-set-id="' + escapeHtml(setId) + '" data-view="token-grid">هم‌ردیفی واژه‌ها</button>';
                    html += '<button type="button" class="consensus-view-btn' + (view === 'aligned-list' ? ' is-active' : '') + '" data-set-id="' + escapeHtml(setId) + '" data-view="aligned-list">هم‌ردیفی احادیث</button>';
                    html += '<button type="button" class="consensus-view-btn' + (view === 'simple-list' ? ' is-active' : '') + '" data-set-id="' + escapeHtml(setId) + '" data-view="simple-list">حدیث‌ها</button>';
                    html += '</div></div>';
                    html += buildConsensusMembersTable(setId);
                    html += '</div>';
                }
                html += '</article>';
                return html;
            }

            function renderConsensusSectionHtml() {
                if (state.consensusLoading && state.consensusMatchedSetIds.length === 0) {
                    return '<div class="loading">در حال بارگذاری مجموعه‌های اجماعی...</div>';
                }
                if (state.consensusError) {
                    return '<div class="error">' + escapeHtml(state.consensusError) + '</div>';
                }
                if (!state.consensusMatchedSetIds.length) {
                    return '<p class="loading">مجموعه اجماعیِ دارای ترجمه برای این آیه پیدا نشد.</p>';
                }
                var visibleCount = Math.min(state.consensusVisibleCount, state.consensusMatchedSetIds.length);
                var html = '<h2 class="hadith-section-title">مجموعه‌های اجماعی دارای ترجمه (' + fmtFa(state.consensusMatchedSetIds.length) + ')</h2>';
                html += '<div id="consensus-list">';
                for (var i = 0; i < visibleCount; i++) {
                    html += renderConsensusCard(state.consensusMatchedSetIds[i], i);
                }
                html += '<div class="consensus-load-more-wrap">';
                if (visibleCount < state.consensusMatchedSetIds.length) {
                    html += '<button type="button" class="hadith-load-more-btn consensus-load-more-btn">بارگذاری ۱۰ مجموعه بعد</button>';
                }
                html += '</div></div>';
                return html;
            }

            function renderPage() {
                var params = getParams();
                var title = document.getElementById('page-title');
                title.textContent = 'احادیث مرتبط با آیه — ' + getSuraName(params.s) + '، آیه ' + params.a;
                var html = buildAyahSectionHtml(state.verse);
                html += state.source === HADITH_SOURCE_CONSENSUS ? renderConsensusSectionHtml() : renderHadithAiSectionHtml();
                show(document.getElementById('content'), html);
            }

            function getCardByHid(hid) {
                var list = document.getElementById('hadith-list');
                if (!list) return null;
                var cards = list.querySelectorAll('.hadith-card');
                var sid = String(hid);
                for (var i = 0; i < cards.length; i++) {
                    if (cards[i].getAttribute('data-hid') === sid) return cards[i];
                }
                return null;
            }

            function setCardContent(card, hadithHtml) {
                if (!card) return;
                card.classList.remove('hadith-card--loading', 'hadith-card--error');
                card.innerHTML = hadithHtml;
            }

            function setCardLoading(card) {
                if (!card) return;
                card.classList.add('hadith-card--loading');
                card.classList.remove('hadith-card--error');
                card.innerHTML = '<div class="hadith-card-placeholder"><span class="hadith-card-spinner"></span> در حال بارگذاری حدیث...</div>';
            }

            function setCardError(card, hid, errMsg) {
                if (!card) return;
                card.classList.remove('hadith-card--loading');
                card.classList.add('hadith-card--error');
                card.innerHTML = '<div class="hadith-card-error">' + escapeHtml(errMsg || 'خطا در بارگذاری') + '</div>' +
                    '<button type="button" class="hadith-retry-btn" data-hid="' + escapeHtml(String(hid)) + '">بارگذاری مجدد</button>';
            }

            function onRetryClick(e) {
                var btn = e.target;
                if (!btn.classList.contains('hadith-retry-btn')) return;
                var hid = btn.getAttribute('data-hid');
                if (!hid) return;
                state.hadithCards[String(hid)] = { status: 'loading' };
                renderPage();
                fetchSingleHadith(hid).then(function(h) {
                    state.hadithCards[String(hid)] = { status: 'loaded', data: h };
                    if (state.source === HADITH_SOURCE_HADITH_AI) renderPage();
                }).catch(function(err) {
                    console.error('[hadith-service get_hadith] retry hid=' + hid, err);
                    state.hadithCards[String(hid)] = { status: 'error', error: err.message || 'خطا در بارگذاری' };
                    if (state.source === HADITH_SOURCE_HADITH_AI) renderPage();
                });
            }

            function onContentClick(e) {
                var target = e.target;
                if (target.classList && target.classList.contains('hadith-retry-btn')) {
                    onRetryClick(e);
                    return;
                }
                var menuBtn = target.closest && target.closest('.hadith-menu-btn');
                if (menuBtn) {
                    e.preventDefault();
                    var menu = document.getElementById('hadith-links-menu');
                    if (menu) {
                        menu.classList.toggle('open');
                    }
                    return;
                }
                var suraEl = target.closest && target.closest('.sura-name-click');
                if (suraEl) {
                    e.preventDefault();
                    var s = parseInt(suraEl.getAttribute('data-sura'), 10);
                    if (s >= 1 && s <= 114) openSuraPicker(s);
                    return;
                }
                var navBtn = target.closest && target.closest('.ayah-nav-btn');
                if (navBtn && !navBtn.disabled) {
                    var dir = navBtn.getAttribute('data-dir');
                    var params = getParams();
                    var s = params.s, a = params.a;
                    var maxA = getMaxAyahForSura(s);
                    if (dir === 'prev' && a > 1) {
                        window.location.href = 'hadith.html?s=' + s + '&a=' + (a - 1);
                    } else if (dir === 'next' && a < maxA) {
                        window.location.href = 'hadith.html?s=' + s + '&a=' + (a + 1);
                    }
                    return;
                }
                var loadMoreBtn = target.closest && target.closest('.hadith-load-more-btn');
                if (loadMoreBtn && !loadMoreBtn.disabled && loadMoreBtn.classList.contains('consensus-load-more-btn')) {
                    var currentVisibleConsensus = Math.min(state.consensusVisibleCount, state.consensusMatchedSetIds.length);
                    state.consensusVisibleCount = Math.min(state.consensusVisibleCount + CONSENSUS_PAGE_SIZE, state.consensusMatchedSetIds.length);
                    renderPage();
                    loadConsensusTranslateDetailsInRange(currentVisibleConsensus, state.consensusVisibleCount);
                    return;
                }
                if (loadMoreBtn && !loadMoreBtn.disabled && state.allHadithIds.length > 0) {
                    var currentVisibleHadith = Math.min(state.hadithVisibleCount, state.allHadithIds.length);
                    state.hadithVisibleCount = Math.min(state.hadithVisibleCount + HADITH_PAGE_SIZE, state.allHadithIds.length);
                    renderPage();
                    loadHadithsInRange(currentVisibleHadith, state.hadithVisibleCount);
                    return;
                }
                var consensusToggleBtn = target.closest && target.closest('.consensus-toggle-btn');
                if (consensusToggleBtn) {
                    var setId = consensusToggleBtn.getAttribute('data-set-id');
                    if (!setId) return;
                    state.consensusOpen[setId] = !state.consensusOpen[setId];
                    renderPage();
                    if (state.consensusOpen[setId]) {
                        ensureConsensusMemberDetail(setId).then(function() {
                            if (state.source === HADITH_SOURCE_CONSENSUS) renderPage();
                        }).catch(function(err) {
                            console.error('[consensus members] failed for', setId, err);
                            state.consensusError = err.message || 'خطا در بارگذاری احادیث مجموعه';
                            if (state.source === HADITH_SOURCE_CONSENSUS) renderPage();
                        });
                    }
                    return;
                }
                var consensusViewBtn = target.closest && target.closest('.consensus-view-btn');
                if (consensusViewBtn) {
                    var viewSetId = consensusViewBtn.getAttribute('data-set-id');
                    var nextView = consensusViewBtn.getAttribute('data-view');
                    if (!viewSetId || !nextView) return;
                    state.consensusHadithView[viewSetId] = nextView;
                    renderPage();
                    return;
                }
                var exportBtn = target.closest && target.closest('#hadith-export-btn');
                if (exportBtn) {
                    handleExport();
                }
            }

            function onContentChange(e) {
                var target = e.target;
                if (!target) return;
                if (target.name === 'hadith-source') {
                    activateSource(target.value);
                    return;
                }
                if (target.id === 'hadith-export-select') {
                    state.exportOption = target.value || HADITH_EXPORT_OPTION_CONSENSUS_TRANSLATE_TABLE;
                }
            }

            async function loadHadithsInRange(startIdx, endIdx) {
                for (var i = startIdx; i < endIdx && i < state.allHadithIds.length; i++) {
                    var id = state.allHadithIds[i];
                    var key = String(id);
                    if (state.hadithCards[key] && state.hadithCards[key].status === 'loaded') continue;
                    state.hadithCards[key] = { status: 'loading' };
                    if (state.source === HADITH_SOURCE_HADITH_AI) renderPage();
                    try {
                        var h = await fetchSingleHadith(id);
                        state.hadithCards[key] = { status: 'loaded', data: h };
                    } catch (err) {
                        console.error('[hadith-service get_hadith] hid=' + id, err);
                        state.hadithCards[key] = { status: 'error', error: err.message || 'خطا در بارگذاری' };
                    }
                    if (state.source === HADITH_SOURCE_HADITH_AI) renderPage();
                    await new Promise(function(r) { setTimeout(r, 0); });
                }
            }

            async function ensureConsensusIndexes() {
                if (state.indexesPromise) return state.indexesPromise;
                state.indexesPromise = Promise.all([
                    fetchJson(CONSENSUS_AYAH_MAP_URL, 'خطا در دریافت نگاشت آیه به حدیث'),
                    fetchJson(CONSENSUS_TRANSLATE_INDEX_URL, 'خطا در دریافت فهرست ترجمه‌های اجماعی')
                ]).then(function(results) {
                    var ayahMap = results[0] || {};
                    var translate = results[1] || {};
                    var translateById = {};
                    var translateOrder = [];
                    var items = Array.isArray(translate.items) ? translate.items : [];
                    for (var k = 0; k < items.length; k++) {
                        var item = items[k];
                        if (!item || !item.consensus_set_id) continue;
                        translateById[item.consensus_set_id] = item;
                        translateOrder.push(item.consensus_set_id);
                    }
                    state.consensusAyahMap = ayahMap;
                    state.consensusTranslateById = translateById;
                    state.consensusTranslateOrder = translateOrder;
                });
                return state.indexesPromise;
            }

            async function prepareConsensusForCurrentAyah() {
                var params = getParams();
                var key = params.s + ':' + params.a;
                state.consensusLoading = true;
                state.consensusError = '';
                state.consensusMatchedSetIds = [];
                state.consensusVisibleCount = CONSENSUS_PAGE_SIZE;
                renderPage();
                await ensureConsensusIndexes();
                var ayahEntry = state.consensusAyahMap && state.consensusAyahMap[key];
                var hadithIds = ayahEntry && Array.isArray(ayahEntry.hadith_ids) ? ayahEntry.hadith_ids : [];
                var matchedSetIds = new Set();
                var hadithIdSet = new Set();
                for (var i = 0; i < hadithIds.length; i++) hadithIdSet.add(String(hadithIds[i]));
                for (var j = 0; j < state.consensusTranslateOrder.length; j++) {
                    var setId = state.consensusTranslateOrder[j];
                    var summary = state.consensusTranslateById[setId];
                    if (!summary || Number(summary.translation_available_count || 0) <= 0) continue;
                    if (summary.translation_source_hid && hadithIdSet.has(String(summary.translation_source_hid))) {
                        matchedSetIds.add(setId);
                    }
                }
                var ordered = [];
                for (var k = 0; k < state.consensusTranslateOrder.length; k++) {
                    var orderedSetId = state.consensusTranslateOrder[k];
                    if (matchedSetIds.has(orderedSetId)) ordered.push(orderedSetId);
                }
                state.consensusMatchedSetIds = ordered;
                state.consensusVisibleCount = CONSENSUS_PAGE_SIZE;
                state.consensusLoading = false;
                renderPage();
                await loadConsensusTranslateDetailsInRange(0, Math.min(state.consensusVisibleCount, state.consensusMatchedSetIds.length));
            }

            async function ensureConsensusTranslateDetail(setId) {
                if (state.consensusTranslateDetails[setId]) return state.consensusTranslateDetails[setId];
                if (!state.consensusTranslatePromises[setId]) {
                    var summary = state.consensusTranslateById[setId];
                    if (!summary || !summary.detail_file) throw new Error('فایل ترجمه این مجموعه پیدا نشد');
                    state.consensusTranslatePromises[setId] = fetchJson(CONSENSUS_TRANSLATE_DETAIL_BASE_URL + summary.detail_file, 'خطا در دریافت متن اجماعی').then(function(detail) {
                        state.consensusTranslateDetails[setId] = detail;
                        return detail;
                    }).finally(function() {
                        delete state.consensusTranslatePromises[setId];
                    });
                }
                return state.consensusTranslatePromises[setId];
            }

            async function ensureConsensusMemberDetail(setId) {
                if (state.consensusMemberDetails[setId]) return state.consensusMemberDetails[setId];
                if (!state.consensusMemberPromises[setId]) {
                    state.consensusMemberPromises[setId] = fetchJson(CONSENSUS_MEMBER_DETAIL_BASE_URL + 'h/' + setId + '.json', 'خطا در دریافت احادیث مجموعه').then(function(detail) {
                        state.consensusMemberDetails[setId] = detail;
                        return detail;
                    }).finally(function() {
                        delete state.consensusMemberPromises[setId];
                    });
                }
                return state.consensusMemberPromises[setId];
            }

            async function ensureConsensusDataForExport() {
                await ensureConsensusIndexes();
                if (!state.consensusMatchedSetIds.length && !state.consensusLoading) {
                    await prepareConsensusForCurrentAyah();
                }
                if (!state.consensusMatchedSetIds.length) return [];
                for (var i = 0; i < state.consensusMatchedSetIds.length; i++) {
                    await ensureConsensusTranslateDetail(state.consensusMatchedSetIds[i]);
                }
                return state.consensusMatchedSetIds.slice();
            }

            function buildWordDocumentHtml(title, bodyHtml) {
                return '<!DOCTYPE html><html lang="fa" dir="rtl"><head><meta charset="UTF-8"><title>' + escapeHtml(title) + '</title>' +
                    '<style>' +
                    'body{font-family:"B Lotus","Noto Naskh Arabic","Tahoma",serif;color:#1f2937;direction:rtl;margin:24px;line-height:1.7;}' +
                    'h1{font-size:20pt;margin:0 0 8px;color:#0f172a;}' +
                    '.doc-meta{margin:0 0 18px;color:#475569;font-size:11pt;}' +
                    '.export-card{margin:0 0 28px;padding:16px 18px;border:1px solid #cbd5e1;border-radius:12px;page-break-inside:avoid;}' +
                    '.export-card-title{font-size:15pt;font-weight:700;margin:0 0 8px;color:#1e3a8a;}' +
                    '.export-card-meta{margin:0 0 12px;color:#475569;font-size:10.5pt;}' +
                    '.export-preview{margin:0 0 14px;font-size:12pt;color:#0f172a;}' +
                    'table{width:100%;border-collapse:collapse;table-layout:fixed;margin-top:8px;}' +
                    'th,td{border:1px solid #cbd5e1;padding:8px 10px;vertical-align:top;text-align:right;word-wrap:break-word;}' +
                    'th{background:#e2e8f0;font-weight:700;}' +
                    '.col-ar{width:56%;}.col-tr{width:44%;}' +
                    '.hadith-quranic{color:#14532d;font-weight:700;}' +
                    '.hadith-quranic-current{color:#9a3412;background:#fed7aa;}' +
                    '.hadith-footnote{color:#1d4ed8;text-decoration:none;}' +
                    '.hadith-footnote-current{color:#9a3412;font-weight:700;}' +
                    '</style></head><body>' + bodyHtml + '</body></html>';
            }

            function buildConsensusTranslateTableExportHtml(setIds) {
                var params = getParams();
                var title = 'احادیث اجماعی و ترجمه - ' + getSuraName(params.s) + ' - آیه ' + fmtFa(params.a);
                var bodyParts = [
                    '<h1>' + escapeHtml(title) + '</h1>',
                    '<div class="doc-meta">سوره ' + escapeHtml(getSuraName(params.s)) + ' | آیه ' + escapeHtml(fmtFa(params.a)) + ' | تعداد مجموعه‌ها: ' + escapeHtml(fmtFa(setIds.length)) + '</div>'
                ];
                for (var i = 0; i < setIds.length; i++) {
                    var setId = setIds[i];
                    var summary = state.consensusTranslateById && state.consensusTranslateById[setId];
                    var detail = state.consensusTranslateDetails[setId];
                    if (!detail) continue;
                    var metaParts = [];
                    if (summary && summary.member_count != null) metaParts.push(fmtFa(summary.member_count) + ' حدیث');
                    if (summary && summary.segment_count != null) metaParts.push(fmtFa(summary.segment_count) + ' بخش');
                    if (detail.translation_language) metaParts.push('زبان ترجمه: ' + localizedLanguageName(detail.translation_language));
                    bodyParts.push('<section class="export-card">');
                    bodyParts.push('<div class="export-card-title">مجموعه ' + escapeHtml(fmtFa(i + 1)) + '</div>');
                    if (metaParts.length) bodyParts.push('<div class="export-card-meta">' + escapeHtml(metaParts.join(' | ')) + '</div>');
                    if (summary && summary.body_consensus_preview) {
                        bodyParts.push('<div class="export-preview">' + escapeHtml(summary.body_consensus_preview) + '</div>');
                    }
                    bodyParts.push('<table><thead><tr><th class="col-ar">متن اجماعی</th><th class="col-tr">ترجمه</th></tr></thead><tbody>');
                    var segments = Array.isArray(detail.segments) ? detail.segments : [];
                    for (var segIdx = 0; segIdx < segments.length; segIdx++) {
                        var segment = segments[segIdx] || {};
                        bodyParts.push('<tr><td class="col-ar">' + buildConsensusSegmentMarkup(segment) + '</td><td class="col-tr">' + escapeHtml(segment.translation_segment || '') + '</td></tr>');
                    }
                    bodyParts.push('</tbody></table></section>');
                }
                return buildWordDocumentHtml(title, bodyParts.join(''));
            }

            function triggerWordDownload(filename, html) {
                var blob = new Blob(['\ufeff', html], { type: 'application/msword' });
                var url = URL.createObjectURL(blob);
                var link = document.createElement('a');
                link.href = url;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
            }

            async function handleExport() {
                if (state.exportInProgress) return;
                state.exportStatus = '';
                state.exportStatusType = '';
                state.exportInProgress = true;
                renderPage();
                try {
                    if (state.exportOption !== HADITH_EXPORT_OPTION_CONSENSUS_TRANSLATE_TABLE) {
                        throw new Error('نوع خروجی پشتیبانی نمی‌شود');
                    }
                    var setIds = await ensureConsensusDataForExport();
                    if (!setIds.length) {
                        throw new Error('برای این آیه مجموعه اجماعیِ دارای ترجمه پیدا نشد');
                    }
                    var params = getParams();
                    var filename = 'hadith-consensus-translate-s' + fmtEn(params.s) + '-a' + fmtEn(params.a) + '.doc';
                    triggerWordDownload(filename, buildConsensusTranslateTableExportHtml(setIds));
                    state.exportStatus = 'فایل Word با ' + fmtFa(setIds.length) + ' جدول آماده و دانلود شد.';
                    state.exportStatusType = 'success';
                } catch (err) {
                    console.error('[hadith-export] failed', err);
                    state.exportStatus = err && err.message ? err.message : 'خروجی گرفتن با خطا روبه‌رو شد.';
                    state.exportStatusType = 'error';
                } finally {
                    state.exportInProgress = false;
                    renderPage();
                }
            }

            async function loadConsensusTranslateDetailsInRange(startIdx, endIdx) {
                for (var i = startIdx; i < endIdx && i < state.consensusMatchedSetIds.length; i++) {
                    var setId = state.consensusMatchedSetIds[i];
                    if (state.consensusTranslateDetails[setId]) continue;
                    try {
                        await ensureConsensusTranslateDetail(setId);
                    } catch (err) {
                        console.error('[consensus translate] failed for', setId, err);
                        state.consensusError = err.message || 'خطا در بارگذاری مجموعه‌های اجماعی';
                    }
                    if (state.source === HADITH_SOURCE_CONSENSUS) renderPage();
                    await new Promise(function(r) { setTimeout(r, 0); });
                }
            }

            function bindEvents() {
                if (state.eventsBound) return;
                state.eventsBound = true;
                var content = document.getElementById('content');
                content.addEventListener('click', onContentClick);
                content.addEventListener('change', onContentChange);
                document.addEventListener('click', function(e) {
                    if (e.target.closest && e.target.closest('.hadith-menu-wrap')) return;
                    var m = document.getElementById('hadith-links-menu');
                    if (m) m.classList.remove('open');
                });
            }

            async function activateSource(source) {
                storeHadithSource(source);
                renderPage();
                if (state.source === HADITH_SOURCE_CONSENSUS) {
                    try {
                        await prepareConsensusForCurrentAyah();
                    } catch (err) {
                        console.error('[consensus] activation failed', err);
                        state.consensusLoading = false;
                        state.consensusError = err.message || 'خطا در بارگذاری داده‌های اجماعی';
                        renderPage();
                    }
                } else {
                    renderPage();
                    if (state.allHadithIds.length > 0) {
                        await loadHadithsInRange(0, Math.min(state.hadithVisibleCount, state.allHadithIds.length));
                    }
                }
            }

            async function run() {
                var s = getParams().s, a = getParams().a;
                if (!s || s < 1 || s > 114 || !a || a < 1) {
                    window.location.replace('hadith.html?s=1&a=1');
                    return;
                }

                showLoading('در حال بارگذاری آیه و لیست احادیث...');
                try {
                    var verse = await fetchVerse(s, a);
                    var hadithIds = await fetchHadithIds(s, a);
                    state.verse = verse;
                    state.allHadithIds = hadithIds;
                    state.hadithVisibleCount = HADITH_PAGE_SIZE;
                    bindEvents();
                    renderPage();
                    await activateSource(state.source);
                } catch (err) {
                    console.error('[hadith-service] run() failed:', err);
                    showError(err.message || 'خطایی رخ داد.', err);
                }
            }

            run();
        })();
    </script>
</body>
</html>
